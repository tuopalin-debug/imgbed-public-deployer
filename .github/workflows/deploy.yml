name: Deploy CloudFlare-ImgBed

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Project name for deployment"
        required: true
        type: string
      deploy_type:
        description: "Deployment type"
        required: true
        type: choice
        options:
          - pages
          - worker
      deploy_mode:
        description: "Deployment mode"
        required: true
        type: choice
        options:
          - new
          - update
          - rebuild
      oauth_token:
        description: "Cloudflare OAuth access token"
        required: true
        type: string
      refresh_token:
        description: "Cloudflare OAuth refresh token"
        required: false
        type: string
      task_id:
        description: "Task ID for progress callback"
        required: false
        type: string

permissions:
  contents: read

env:
  PROJECT_NAME: ${{ inputs.project_name }}
  DEPLOY_TYPE: ${{ inputs.deploy_type }}
  DEPLOY_MODE: ${{ inputs.deploy_mode }}
  OAUTH_TOKEN: ${{ inputs.oauth_token }}
  CALLBACK_URL: https://glow.ccwu.cc/api/progress
  PRIVATE_SOURCE_DIR: private-deployer-source
  PAGES_SOURCE_REPO: tuopalin-debug/CloudFlare-ImgBed-pages
  WORKER_SOURCE_REPO: tuopalin-debug/CloudFlare-ImgBed-worker

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: imgbed-public-deployer-global
      cancel-in-progress: false

    steps:
      - name: Checkout public runner
        uses: actions/checkout@v5

      - name: Validate deployment inputs
        run: |
          set -euo pipefail

          if [ "$DEPLOY_TYPE" != "pages" ] && [ "$DEPLOY_TYPE" != "worker" ]; then
            echo "Unsupported deploy_type: $DEPLOY_TYPE" >&2
            exit 1
          fi

          if [ "$DEPLOY_MODE" != "new" ] && [ "$DEPLOY_MODE" != "update" ] && [ "$DEPLOY_MODE" != "rebuild" ]; then
            echo "Unsupported deploy_mode: $DEPLOY_MODE" >&2
            exit 1
          fi

          if [ -z "${{ secrets.PRIVATE_DEPLOYER_TOKEN }}" ]; then
            echo "PRIVATE_DEPLOYER_TOKEN is required" >&2
            exit 1
          fi

      - name: Resolve private source repository
        id: source
        run: |
          set -euo pipefail

          # deploy_type 只在这里决定源码仓库，后续步骤只读同一个目录，路线更直观。
          if [ "$DEPLOY_TYPE" = "worker" ]; then
            echo "repo=$WORKER_SOURCE_REPO" >> "$GITHUB_OUTPUT"
          else
            echo "repo=$PAGES_SOURCE_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout private deployer source
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.source.outputs.repo }}
          token: ${{ secrets.PRIVATE_DEPLOYER_TOKEN }}
          path: ${{ env.PRIVATE_SOURCE_DIR }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Mask sensitive tokens
        run: |
          echo "::add-mask::${{ inputs.oauth_token }}"
          echo "::add-mask::${{ inputs.refresh_token }}"
          echo "::add-mask::${{ secrets.PRIVATE_DEPLOYER_TOKEN }}"

      - name: Load runtime identifiers
        run: |
          set -euo pipefail

          TASK_ID_VALUE=$(jq -r '.inputs.task_id // ""' "$GITHUB_EVENT_PATH")
          if [ -n "$TASK_ID_VALUE" ]; then
            echo "::add-mask::$TASK_ID_VALUE"
          fi

          echo "TASK_ID=$TASK_ID_VALUE" >> "$GITHUB_ENV"

      - name: Prepare progress reporter
        run: |
          cat > /tmp/report-progress.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          CALLBACK_URL="${1:-}"
          PAYLOAD="${2:-}"
          ATTEMPT=1
          MAX_ATTEMPTS=4

          if [ -z "$CALLBACK_URL" ] || [ -z "$PAYLOAD" ]; then
            exit 0
          fi

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            if curl -fsS --retry 0 --max-time 15 -o /dev/null -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"; then
              exit 0
            fi

            if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
              sleep $((ATTEMPT * 2))
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "progress callback failed after retries" >&2
          exit 0
          EOF

          chmod +x /tmp/report-progress.sh

      - name: Configure Wrangler OAuth
        run: |
          mkdir -p ~/.wrangler/config
          cat > ~/.wrangler/config/default.toml <<EOF
          oauth_token = "${{ inputs.oauth_token }}"
          refresh_token = "${{ inputs.refresh_token }}"
          expiration_time = "2099-12-31T23:59:59Z"
          scopes = [ "account:read", "user:read", "workers:write", "workers_kv:write", "workers_routes:write", "workers_scripts:write", "workers_tail:read", "d1:write", "pages:write", "zone:read", "offline_access" ]
          EOF

      - name: Get Account ID
        id: account
        run: |
          set -euo pipefail

          ACCOUNT_ID=$(curl -fsS \
            -H "Authorization: Bearer $OAUTH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts" | jq -r '.result[0].id // empty')
          if [ -z "$ACCOUNT_ID" ]; then
            echo "Unable to resolve Cloudflare account id" >&2
            exit 1
          fi

          echo "ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "Account ID: $ACCOUNT_ID"

      - name: Export Cloudflare account env
        run: |
          set -euo pipefail

          # Wrangler 后续所有命令都显式使用本次 OAuth 授权和账号，避免默认缓存账号跑偏。
          echo "CLOUDFLARE_API_TOKEN=$OAUTH_TOKEN" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=${{ steps.account.outputs.ACCOUNT_ID }}" >> "$GITHUB_ENV"

      - name: Report workflow started
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" \
            --arg projectName "$PROJECT_NAME" \
            --arg stage "started" \
            --arg messageCode "STAGE_STARTED" \
            --arg message "Deployment workflow started" \
            --arg githubRunId "${{ github.run_id }}" \
            --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 5 \
            '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

      - name: Inspect Cloudflare state
        id: cf_state
        run: |
          set -euo pipefail

          ACCOUNT_ID="${{ steps.account.outputs.ACCOUNT_ID }}"

          if [ "$DEPLOY_TYPE" = "pages" ]; then
            PROJECT_STATUS=$(curl -sS -o /tmp/project-response.json -w "%{http_code}" \
              -H "Authorization: Bearer $OAUTH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME")
          else
            PROJECT_STATUS=$(curl -sS -o /tmp/project-response.json -w "%{http_code}" \
              -H "Authorization: Bearer $OAUTH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/$PROJECT_NAME")
          fi

          PROJECT_EXISTS=false
          if [ "$PROJECT_STATUS" = "200" ]; then
            PROJECT_EXISTS=true
          elif [ "$PROJECT_STATUS" != "404" ]; then
            echo "Unable to inspect project state. HTTP $PROJECT_STATUS" >&2
            cat /tmp/project-response.json >&2 || true
            exit 1
          fi

          KV_RESPONSE=$(curl -fsS -H "Authorization: Bearer $OAUTH_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/storage/kv/namespaces?per_page=1000")
          KV_ID=$(echo "$KV_RESPONSE" | jq -r '.result[] | select(.title=="imgbed_kv") | .id' | head -n 1)

          D1_RESPONSE=$(curl -fsS -H "Authorization: Bearer $OAUTH_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database?per_page=1000")
          D1_ID=$(echo "$D1_RESPONSE" | jq -r '.result[] | select(.name=="imgbed_db") | .uuid' | head -n 1)

          echo "PROJECT_EXISTS=$PROJECT_EXISTS" >> "$GITHUB_OUTPUT"
          echo "KV_ID=$KV_ID" >> "$GITHUB_OUTPUT"
          echo "D1_ID=$D1_ID" >> "$GITHUB_OUTPUT"

      - name: Validate deployment mode state
        run: |
          set -euo pipefail

          PROJECT_EXISTS="${{ steps.cf_state.outputs.PROJECT_EXISTS }}"
          KV_ID="${{ steps.cf_state.outputs.KV_ID }}"
          D1_ID="${{ steps.cf_state.outputs.D1_ID }}"

          if [ "$DEPLOY_MODE" = "new" ]; then
            if [ "$PROJECT_EXISTS" = "true" ]; then
              echo "Project already exists; new mode requires an empty project name" >&2
              exit 1
            fi
            if [ -n "$KV_ID" ] || [ -n "$D1_ID" ]; then
              echo "imgbed_kv or imgbed_db already exists; new mode requires empty fixed resources" >&2
              exit 1
            fi
          fi

          if [ "$DEPLOY_MODE" = "update" ] && [ "$PROJECT_EXISTS" != "true" ]; then
            echo "Update requires an existing project" >&2
            exit 1
          fi

          if [ "$DEPLOY_MODE" = "rebuild" ] && [ "$PROJECT_EXISTS" = "true" ]; then
            echo "Rebuild requires the old project to be deleted" >&2
            exit 1
          fi

      - name: Prepare Pages project
        if: ${{ env.DEPLOY_TYPE == 'pages' && env.DEPLOY_MODE != 'update' }}
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "pages_creating" \
            --arg messageCode "STAGE_PAGES_CREATING" --arg message "Preparing Pages project" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 15 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

          echo "Creating Pages project: $PROJECT_NAME"
          npx wrangler pages project create "$PROJECT_NAME" --production-branch main

          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "pages_created" \
            --arg messageCode "STAGE_PAGES_CREATED" --arg message "Pages project ready" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 25 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

      - name: Prepare Worker project
        if: ${{ env.DEPLOY_TYPE == 'worker' && env.DEPLOY_MODE != 'update' }}
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "pages_creating" \
            --arg messageCode "STAGE_PAGES_CREATING" --arg message "Preparing Worker project" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 15 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

          # Worker 不需要提前创建项目，wrangler deploy 会按 name 发布 Worker 脚本。
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "pages_created" \
            --arg messageCode "STAGE_PAGES_CREATED" --arg message "Worker project ready" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 25 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

      - name: Report Worker project ready
        if: ${{ env.DEPLOY_TYPE == 'worker' && env.DEPLOY_MODE == 'update' }}
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "pages_created" \
            --arg messageCode "STAGE_PAGES_CREATED" --arg message "Worker project ready" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 25 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

      - name: Ensure KV namespace
        if: ${{ env.DEPLOY_MODE != 'update' }}
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "kv_creating" \
            --arg messageCode "STAGE_KV_CREATING" --arg message "Creating KV namespace" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 35 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

          if [ -n "${{ steps.cf_state.outputs.KV_ID }}" ]; then
            echo "Rebuild mode: reusing KV namespace imgbed_kv"
          else
            echo "Creating KV namespace: imgbed_kv"
            npx wrangler kv namespace create "imgbed_kv"
          fi

          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "kv_created" \
            --arg messageCode "STAGE_KV_CREATED" --arg message "KV namespace ready" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 45 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

      - name: Ensure D1 database
        if: ${{ env.DEPLOY_MODE != 'update' }}
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "d1_checking" \
            --arg messageCode "STAGE_D1_CHECKING" --arg message "Checking D1 database" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 52 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "d1_creating" \
            --arg messageCode "STAGE_D1_CREATING" --arg message "Creating D1 database" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 58 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

          if [ -n "${{ steps.cf_state.outputs.D1_ID }}" ]; then
            echo "Rebuild mode: reusing D1 database imgbed_db"
          else
            echo "Creating D1 database: imgbed_db"
            npx wrangler d1 create "imgbed_db"
          fi

          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "d1_created" \
            --arg messageCode "STAGE_D1_CREATED" --arg message "D1 database ready" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 64 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

      - name: Install private deployer dependencies
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "dependencies_installing" \
            --arg messageCode "STAGE_DEPENDENCIES_INSTALLING" --arg message "Installing dependencies" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 70 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

          npm install

      - name: Report dependencies installed
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "dependencies_installed" \
            --arg messageCode "STAGE_DEPENDENCIES_INSTALLED" --arg message "Dependencies installed" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 74 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

      - name: Resolve Cloudflare resources
        if: ${{ env.DEPLOY_MODE != 'update' || env.DEPLOY_TYPE == 'worker' }}
        id: resources
        run: |
          set -euo pipefail

          ACCOUNT_ID="${{ steps.account.outputs.ACCOUNT_ID }}"

          KV_RESPONSE=$(curl -fsS -H "Authorization: Bearer $OAUTH_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/storage/kv/namespaces?per_page=1000")
          KV_ID=$(echo "$KV_RESPONSE" | jq -r '.result[] | select(.title=="imgbed_kv") | .id' | head -n 1)

          D1_RESPONSE=$(curl -fsS -H "Authorization: Bearer $OAUTH_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database?per_page=1000")
          D1_ID=$(echo "$D1_RESPONSE" | jq -r '.result[] | select(.name=="imgbed_db") | .uuid' | head -n 1)

          if [ -z "$KV_ID" ]; then
            echo "KV namespace imgbed_kv was not found" >&2
            exit 1
          fi

          if [ -z "$D1_ID" ]; then
            echo "D1 database imgbed_db was not found" >&2
            exit 1
          fi

          echo "KV_ID=$KV_ID" >> "$GITHUB_OUTPUT"
          echo "D1_ID=$D1_ID" >> "$GITHUB_OUTPUT"

      - name: Initialize D1 database
        if: ${{ env.DEPLOY_MODE != 'update' }}
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          set -euo pipefail

          if [ ! -f "database/init.sql" ]; then
            echo "D1 init file database/init.sql is missing" >&2
            exit 1
          fi

          # 新建和重建都要把 imgbed_db 初始化到可直接使用；更新只发代码，不修数据库。
          npx wrangler d1 execute "imgbed_db" --remote --file database/init.sql

      - name: Bind Pages resources via API
        if: ${{ env.DEPLOY_TYPE == 'pages' && env.DEPLOY_MODE != 'update' }}
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          set -euo pipefail

          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "binding_resources" \
            --arg messageCode "STAGE_BINDING_RESOURCES" --arg message "Binding KV and D1 resources" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 86 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

          ACCOUNT_ID="${{ steps.account.outputs.ACCOUNT_ID }}"
          KV_ID="${{ steps.resources.outputs.KV_ID }}"
          D1_ID="${{ steps.resources.outputs.D1_ID }}"
          PAYLOAD=$(jq -nc \
            --arg kvId "$KV_ID" \
            --arg d1Id "$D1_ID" \
            '{"deployment_configs":{"production":{"kv_namespaces":{"img_url":{"namespace_id":$kvId}},"d1_databases":{"Index":{"id":$d1Id}}},"preview":{"kv_namespaces":{"img_url":{"namespace_id":$kvId}},"d1_databases":{"Index":{"id":$d1Id}}}}}')

          curl -fsS -X PATCH "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME" \
            -H "Authorization: Bearer $OAUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" >/dev/null

      - name: Generate Worker wrangler config
        if: ${{ env.DEPLOY_TYPE == 'worker' }}
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          set -euo pipefail

          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "binding_resources" \
            --arg messageCode "STAGE_BINDING_RESOURCES" --arg message "Binding KV and D1 resources" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 86 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

          if [ ! -f "dist/worker/index.js" ]; then
            echo "Worker entry dist/worker/index.js is missing" >&2
            exit 1
          fi

          if [ ! -d "dist/client" ]; then
            echo "Worker assets directory dist/client is missing" >&2
            exit 1
          fi

          # Worker 首发只绑定 KV + D1，不保留模板里可能存在的 R2 配置。
          cat > wrangler.toml <<EOF
          name = "$PROJECT_NAME"
          main = "dist/worker/index.js"
          compatibility_date = "2026-05-07"

          [assets]
          directory = "dist/client"
          binding = "ASSETS"
          not_found_handling = "single-page-application"
          run_worker_first = true

          [[kv_namespaces]]
          binding = "img_url"
          id = "${{ steps.resources.outputs.KV_ID }}"

          [[d1_databases]]
          binding = "Index"
          database_name = "imgbed_db"
          database_id = "${{ steps.resources.outputs.D1_ID }}"
          EOF

          if grep -q "r2_buckets" wrangler.toml; then
            echo "Worker wrangler.toml must not contain R2 bindings" >&2
            exit 1
          fi

      - name: Deploy to Pages
        if: ${{ env.DEPLOY_TYPE == 'pages' }}
        id: deploy_pages
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "deploying_code" \
            --arg messageCode "STAGE_DEPLOYING_CODE" --arg message "Deploying project files" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 92 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

          OUTPUT=$(npx wrangler pages deploy . --project-name "$PROJECT_NAME" --branch main --commit-dirty=true 2>&1)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -oE 'https://[^[:space:]]+\.pages\.dev' | tail -1 || true)
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Redeploy Pages to apply bindings
        if: ${{ env.DEPLOY_TYPE == 'pages' && env.DEPLOY_MODE != 'update' }}
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "finalizing" \
            --arg messageCode "STAGE_FINALIZING" --arg message "Applying final bindings" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 97 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

          OUTPUT=$(npx wrangler pages deploy . --project-name "$PROJECT_NAME" --branch main --commit-dirty=true 2>&1)
          echo "$OUTPUT"

      - name: Deploy to Worker
        if: ${{ env.DEPLOY_TYPE == 'worker' }}
        id: deploy_worker
        working-directory: ${{ env.PRIVATE_SOURCE_DIR }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "deploying_code" \
            --arg messageCode "STAGE_DEPLOYING_CODE" --arg message "Deploying Worker" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 92 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

          OUTPUT=$(npx wrangler deploy --name "$PROJECT_NAME" --config wrangler.toml 2>&1)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -oE 'https://[^[:space:]]+\.workers\.dev' | tail -1 || true)

          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Finalize Worker deployment
        if: ${{ env.DEPLOY_TYPE == 'worker' }}
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "finalizing" \
            --arg messageCode "STAGE_FINALIZING" --arg message "Finalizing Worker deployment" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 97 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

      - name: Report success
        run: |
          if [ "$DEPLOY_TYPE" = "worker" ]; then
            DEPLOY_URL="${{ steps.deploy_worker.outputs.DEPLOY_URL }}"
          else
            DEPLOY_URL="${{ steps.deploy_pages.outputs.DEPLOY_URL }}"
          fi

          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "completed" \
            --arg messageCode "STAGE_COMPLETED" --arg message "Deployment completed" --arg projectUrl "$DEPLOY_URL" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson percent 100 '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,projectUrl:$projectUrl,percent:$percent,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"
          echo "Deploy complete: $DEPLOY_URL"

      - name: Report failure
        if: failure()
        run: |
          /tmp/report-progress.sh "$CALLBACK_URL" "$(jq -nc \
            --arg taskId "$TASK_ID" --arg projectName "$PROJECT_NAME" --arg stage "failed" \
            --arg messageCode "STAGE_FAILED" --arg message "Deployment failed" \
            --arg errorCode "WORKFLOW_STEP_FAILED" --arg error "Deployment failed" \
            --arg githubRunId "${{ github.run_id }}" --argjson githubRunAttempt ${{ github.run_attempt }} \
            --arg workflowName "${{ github.workflow }}" --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{taskId:$taskId,projectName:$projectName,stage:$stage,messageCode:$messageCode,message:$message,errorCode:$errorCode,error:$error,githubRunId:$githubRunId,githubRunAttempt:$githubRunAttempt,workflowName:$workflowName,runUrl:$runUrl}')"

      - name: Cleanup
        if: always()
        run: rm -rf ~/.wrangler
